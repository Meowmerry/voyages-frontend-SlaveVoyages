# Builds the frontend Docker image, publishes it to Docker Hub, and points
# the dev Azure Container App at the new image.
#
# Release flow — package.json's "version" field is the single source of truth:
#   - Pull requests build the image only (no push) to validate that
#     install + build still work. PRs from forks cannot read repo secrets,
#     so the private-package install may fail there.
#   - Pushes to main publish ONLY when package.json's version has no image
#     tag on Docker Hub yet: the run pushes <version> / latest / <commit-sha>,
#     updates the dev container app, and creates the matching v<version> git
#     tag. Merges that don't bump the version just re-validate the build.
#   - workflow_dispatch pushes a <commit-sha>-only tag from any ref and
#     deploys it to dev: the escape hatch for testing the pipeline.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME       Docker Hub namespace the image lives under (for
#                            access tokens this is the org/user namespace,
#                            lowercase — not the token label)
#   DOCKERHUB_TOKEN          Docker Hub access token with read/write scope
#   GH_PACKAGES_TOKEN        (optional) PAT with read:packages; only needed if
#                            @slavevoyages/voyages-contribute does not grant
#                            this repo access via the package's
#                            "Manage Actions access" settings, in which case
#                            the default GITHUB_TOKEN suffices
#   AZURE_CLIENT_ID          on the dev environment: managed identity with a
#   AZURE_TENANT_ID          federated credential for environment:dev and
#   AZURE_SUBSCRIPTION_ID    Container Apps Contributor on the dev app
#
# Required variables:
#   AZURE_CONTAINERAPP_NAME  repo-level: dev container app to update; gates
#                            the deploy job (leave unset to skip it), so it
#                            must be visible before the environment resolves
#   AZURE_RESOURCE_GROUP     on the dev environment, like the AZURE_* secrets
#
# The image carries no environment-specific configuration: at container start
# it renders /env-config.json from its VITE_* environment variables (set on
# the container app / docker run -e), which the SPA fetches before booting.

name: docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: slavevoyages/voyages-frontend

jobs:
  # Every merge to main publishes package.json's version, so every PR must
  # bump it: strictly greater than main's, and not already on Docker Hub.
  version-bump:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Require a version bump vs main
        run: |
          HEAD_VERSION=$(jq -r .version package.json)
          git fetch --depth=1 origin "${{ github.base_ref }}"
          BASE_VERSION=$(git show "origin/${{ github.base_ref }}:package.json" | jq -r .version)
          echo "${{ github.base_ref }}: $BASE_VERSION — this PR: $HEAD_VERSION"
          if [ "$HEAD_VERSION" = "$BASE_VERSION" ]; then
            echo "::error file=package.json::version ($HEAD_VERSION) must be bumped — every merge to main publishes a release"
            exit 1
          fi
          HIGHEST=$(printf '%s\n%s\n' "$BASE_VERSION" "$HEAD_VERSION" | sort -V | tail -n1)
          if [ "$HIGHEST" != "$HEAD_VERSION" ]; then
            echo "::error file=package.json::version ($HEAD_VERSION) must be greater than ${{ github.base_ref }}'s ($BASE_VERSION)"
            exit 1
          fi
          CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://hub.docker.com/v2/repositories/${IMAGE_NAME}/tags/${HEAD_VERSION}")
          if [ "$CODE" = "200" ]; then
            echo "::error file=package.json::${IMAGE_NAME}:${HEAD_VERSION} already exists on Docker Hub — pick a new version"
            exit 1
          fi

  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    outputs:
      pushed: ${{ steps.gate.outputs.pushed }}
    steps:
      - uses: actions/checkout@v5

      - name: Decide whether to publish
        id: gate
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          PUBLISH=false
          if [ "${{ github.event_name }}" = "push" ]; then
            CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              "https://hub.docker.com/v2/repositories/${IMAGE_NAME}/tags/${VERSION}")
            case "$CODE" in
              404) PUBLISH=true ;;
              200) echo "::notice::${IMAGE_NAME}:${VERSION} already on Docker Hub — build-only run" ;;
              *)   echo "::error::Docker Hub tag check failed (HTTP $CODE)"; exit 1 ;;
            esac
          fi
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"
          if [ "$PUBLISH" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.gate.outputs.pushed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.gate.outputs.version }},enable=${{ steps.gate.outputs.publish }}
            type=raw,value=latest,enable=${{ steps.gate.outputs.publish }}
            type=sha,format=long,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.gate.outputs.pushed == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Single-manifest image: some consumers (Container Apps included)
          # mishandle the attestation manifest index provenance produces.
          provenance: false
          secrets: |
            gh_npm_token=${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag the release commit
        if: steps.gate.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/v${{ steps.gate.outputs.version }}" \
            -f sha="${{ github.sha }}"; then
            echo "created tag v${{ steps.gate.outputs.version }}"
          else
            echo "::warning::could not create tag v${{ steps.gate.outputs.version }} (may already exist)"
          fi

  deploy-dev:
    needs: build-push
    if: needs.build-push.outputs.pushed == 'true' && vars.AZURE_CONTAINERAPP_NAME != ''
    runs-on: ubuntu-latest
    # The Azure federated credential is scoped to this environment
    # (subject repo:SlaveVoyages/voyages-frontend:environment:dev), so the
    # AZURE_* secrets and AZURE_RESOURCE_GROUP belong in the environment.
    # Only AZURE_CONTAINERAPP_NAME must be repo-level: the job-level `if`
    # above is evaluated before the environment is entered, so
    # environment-scoped variables are not visible to it.
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Point dev container app at the new image
        run: |
          az extension add --name containerapp --upgrade
          az containerapp update \
            --name '${{ vars.AZURE_CONTAINERAPP_NAME }}' \
            --resource-group '${{ vars.AZURE_RESOURCE_GROUP }}' \
            --image 'docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }}'
